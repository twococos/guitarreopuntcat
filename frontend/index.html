<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cançoner</title>
    <link rel="stylesheet" href="song.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>🎵 Cançoner</h1>
      <p class="subtitle">Tria les cançons i genera el teu PDF</p>
      <div class="header-actions">
        <a href="/editor.html" id="btn-new-song" class="btn-new-song">+ Nova cançó</a>
        <div id="user-widget"></div>
      </div>
    </header>

    <main id="main-layout">
      <!-- ── Col·lumna 1: cerca + llista DB ── -->
      <section id="panel-songs">
        <div class="toolbar">
          <input type="text" id="search" placeholder="Cerca per títol o artista…" />
          <select id="sort">
            <option value="title">Per títol</option>
            <option value="artist">Per artista</option>
            <option value="key">Per to</option>
          </select>
        </div>
        <ul id="song-list"></ul>
      </section>

      <!-- ── Col·lumna 2: cançoner ── -->
      <section id="panel-canconer">
        <div class="canconer-header">
          <input
            type="text"
            id="canconer-title"
            placeholder="Títol del cançoner…"
            value="El meu cançoner"
          />
          <div class="canconer-header-actions">
            <button
              id="btn-toggle-preview"
              class="btn-toggle-preview active"
              title="Mostrar/amagar vista prèvia"
            >
              👁 Vista prèvia
            </button>
            <button id="btn-save-canconer" class="btn-icon-action" disabled title="Guardar">
              💾 Guardar
            </button>
            <button id="btn-generate" class="btn-icon-action" disabled title="Generar PDF">
              📄 PDF
            </button>
          </div>
        </div>

        <div id="canconer-empty" class="empty-state">
          <span>🎶</span>
          <p>Clica una cançó per afegir-la</p>
        </div>

        <!-- Mode normal (vista prèvia activa) -->
        <ul id="canconer-list"></ul>

        <!-- Mode compacte (vista prèvia desactivada) -->
        <div id="canconer-grid" hidden></div>
      </section>

      <!-- ── Col·lumna 3: vista prèvia ── -->
      <section id="panel-detail">
        <div id="detail-empty" class="empty-state">
          <span>←</span>
          <p>Selecciona una cançó del cançoner</p>
        </div>
        <div id="detail-content" hidden>
          <div class="detail-header">
            <div>
              <h2 id="detail-title"></h2>
              <p id="detail-meta"></p>
            </div>
            <div class="transpose-control">
              <label>To</label>
              <div class="transpose-buttons">
                <button id="btn-down">−</button>
                <span id="transpose-value">+0</span>
                <button id="btn-up">+</button>
              </div>
              <small id="display-key"></small>
            </div>
          </div>
          <div id="detail-body"></div>
        </div>
      </section>
    </main>

    <!-- Toast de sobreescriptura -->
    <div id="propose-login-toast" class="propose-toast" hidden>
      <span>🔒</span>
      <p>Inicia sessió per poder proposar noves cançons.</p>
      <button id="propose-login-btn">Inicia sessió</button>
      <button id="propose-toast-close">✕</button>
    </div>

    <script src="/shared/transpose.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
